<script>
// ── STORAGE: Firebase primary, localStorage fallback ─────────────────
// Firebase-only storage — no localStorage to avoid conflicts
const ST={
  async get(k){
    try{
      const snap=await FDB.ref('ft26/'+k).once('value');
      if(snap.exists()){const v=snap.val();return{value:typeof v==='string'?v:JSON.stringify(v)};}
    }catch(e){console.warn('FB get',k,e);}
    return null;
  },
  async set(k,v){
    try{await FDB.ref('ft26/'+k).set(v);}catch(e){console.warn('FB set',k,e);alert('Errore salvataggio Firebase: '+e.message);}
  }
};

const DAYS=[
  {date:'2026-04-01',label:'Mer 1 Apr',day:'MER',num:'01'},
  {date:'2026-04-02',label:'Gio 2 Apr',day:'GIO',num:'02'},
  {date:'2026-04-03',label:'Ven 3 Apr',day:'VEN',num:'03'},
  {date:'2026-04-04',label:'Sab 4 Apr',day:'SAB',num:'04'},
  {date:'2026-04-05',label:'Dom 5 Apr',day:'DOM',num:'05'},
  {date:'2026-04-06',label:'Lun 6 Apr',day:'LUN',num:'06'},
  {date:'2026-04-07',label:'Mar 7 Apr',day:'MAR',num:'07'},
  {date:'2026-04-08',label:'Mer 8 Apr',day:'MER',num:'08'},
  {date:'2026-04-09',label:'Gio 9 Apr',day:'GIO',num:'09'},
  {date:'2026-04-10',label:'Ven 10 Apr',day:'VEN',num:'10'},
  {date:'2026-04-11',label:'Sab 11 Apr',day:'SAB',num:'11'},
  {date:'2026-04-12',label:'Dom 12 Apr',day:'DOM',num:'12'},
  {date:'2026-04-13',label:'Lun 13 Apr',day:'LUN',num:'13'},
  {date:'2026-04-14',label:'Mar 14 Apr',day:'MAR',num:'14'},
  {date:'2026-04-15',label:'Mer 15 Apr',day:'MER',num:'15'}
];
const SLOTS=[{id:'M1',label:'8:30-10:30',ses:'Mattina'},{id:'M2',label:'10:30-12:30',ses:'Mattina'},{id:'P1',label:'14:00-16:00',ses:'Pom.'},{id:'P2',label:'16:00-18:00',ses:'Pom.'}];
const LINES=[1,2,3,4];
const CAMPO={1:'A',2:'A',3:'B',4:'B'};
const PAL=['#1D4ED8','#DC2626','#059669','#D97706','#7C3AED','#DB2777','#0891B2','#EA580C','#94A3B8','#64748B','#B45309','#0F766E'];
const BT=[{id:'s',lbl:'Singolo',sh:'1x',col:'#0891B2'},{id:'d',lbl:'Doppio',sh:'2x',col:'#7C3AED'}];
const PWD='filippi2026';
const uid=()=>Math.random().toString(36).slice(2,9);
const isAct=(c,d)=>{const ci=c.in||c.arrivalDate;const co=c.out||c.departureDate;if(!ci||!co)return true;return ci<=d&&co>=d;};
function rg(h,a){const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return`rgba(${r},${g},${b},${a})`;}
function rgb(h){return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];}
function bstr(c){if(!c)return'';if(c.auto)return'auto';const f=c.fleet||{};return BT.filter(b=>(f[b.id]||0)>0).map(b=>`${f[b.id]}x${b.sh}`).join(' ')||'';}
function cBW(c){if(!c||c.auto)return{s:0,d:0};return{s:c.fleet?.s||0,d:c.fleet?.d||0};}
function unitBW(members){return members.reduce((a,c)=>{const w=cBW(c);return{s:a.s+w.s,d:a.d+w.d};},{s:0,d:0});}
function bwStr(w){return[w.s>0?w.s+'x1x':'',w.d>0?w.d+'x2x':''].filter(Boolean).join(' ')||'';}
function buildUnits(clubs,date,groups){
  const act=clubs.filter(c=>isAct(c,date));const units=[];const used=new Set();
  act.filter(c=>!c.sharable).forEach(c=>units.push([c]));
  (groups||[]).forEach(g=>{const ms=g.members.map(id=>act.find(c=>c.id===id&&c.sharable)).filter(Boolean).filter(c=>!used.has(c.id));if(ms.length){units.push(ms);ms.forEach(c=>used.add(c.id));}});
  act.filter(c=>c.sharable&&!used.has(c.id)).forEach(c=>units.push([c]));
  return units;
}
function applyRot(clubs,sched,groups){
  const s=JSON.parse(JSON.stringify(sched));
  DAYS.forEach(d=>SLOTS.forEach(sl=>LINES.forEach(l=>{s[d.date][sl.id][l]={ids:[]};})));
  DAYS.forEach((day,di)=>{
    const units=buildUnits(clubs,day.date,groups);if(!units.length)return;
    const N=units.length;const rot=Array.from({length:N},(_,i)=>units[(i+di)%N]);
    rot.forEach((unit,i)=>{const line=(i%4)+1;const ms=i<4?'M1':'M2';const ps=i<4?'P1':'P2';const ids=unit.map(c=>c.id);s[day.date][ms][line]={ids};s[day.date][ps][line]={ids};});
  });return s;
}
function slotTot(clubs,sched,date,slotId){let s=0,d=0;LINES.forEach(l=>{(sched?.[date]?.[slotId]?.[l]?.ids||[]).forEach(id=>{const c=clubs.find(x=>x.id===id);if(c&&!c.auto){s+=(c.fleet?.s||0);d+=(c.fleet?.d||0);}});});return{s,d};}
function calcAlloc(stk,clubs){const res={};clubs.forEach(c=>res[c.id]={s:0,d:0});BT.forEach(bt=>{let av=stk[bt.id]||0;const req=clubs.filter(c=>!c.auto&&(c.want?.[bt.id]||0)>0).sort((a,b)=>(a.in||'').localeCompare(b.in||''));if(!req.length||!av)return;const tw=req.reduce((a,c)=>a+(c.want[bt.id]||0),0);let ds=0;req.forEach(c=>{const sh=Math.floor(av*(c.want[bt.id]||0)/tw);res[c.id][bt.id]=Math.min(sh,c.want[bt.id]||0);ds+=res[c.id][bt.id];});let lft=av-ds;[...req].sort((a,b)=>(b.want?.[bt.id]||0)-(a.want?.[bt.id]||0)).forEach(c=>{if(!lft)return;if(res[c.id][bt.id]<(c.want?.[bt.id]||0)){res[c.id][bt.id]++;lft--;}});});return res;}
function atot(ta){const t={s:0,d:0};if(!ta)return t;Object.values(ta).forEach(v=>{t.s+=(v.s||0);t.d+=(v.d||0);});return t;}
function mkS(){const s={};DAYS.forEach(d=>{s[d.date]={};SLOTS.forEach(sl=>{s[d.date][sl.id]={};LINES.forEach(l=>{s[d.date][sl.id][l]={ids:[]};});});});return s;}
function hydS(sv){const s=mkS();if(!sv)return s;DAYS.forEach(d=>SLOTS.forEach(sl=>LINES.forEach(l=>{const c=sv?.[d.date]?.[sl.id]?.[l];if(!c)return;if(Array.isArray(c.ids))s[d.date][sl.id][l]={ids:c.ids};else{const ids=[];if(c.c1)ids.push(c.c1);if(c.c2)ids.push(c.c2);s[d.date][sl.id][l]={ids};}})));return s;}
function mgC(c){if(c.arrivalDate&&!c.in)c.in=c.arrivalDate;if(c.departureDate&&!c.out)c.out=c.departureDate;return c;}

async function load(){
  // Firebase is the single source of truth — no localStorage
  const app=document.getElementById('app');
  app.innerHTML='<div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:#94A3B8"><div style="font-size:14px;font-family:DM Sans,sans-serif">Connessione Firebase...</div></div>';

  const KEYS=[
    {ref:K+'-c', parse:function(v){return JSON.parse(v).map(mgC);}, apply:function(d){S.clubs=d;if(!S.selClub&&d.length)S.selClub=d[0].id;}},
    {ref:K+'-s', parse:function(v){return hydS(JSON.parse(v));},    apply:function(d){S.sched=d;}},
    {ref:K+'-k', parse:function(v){return JSON.parse(v);},          apply:function(d){S.stk=d;}},
    {ref:K+'-g', parse:function(v){return JSON.parse(v);},          apply:function(d){S.groups=d;}},
    {ref:K+'-p', parse:function(v){return JSON.parse(v);},          apply:function(d){S.prices=d;}},
    {ref:K+'-m', parse:function(v){return JSON.parse(v);},          apply:function(d){S.payments=d;}},
    {ref:K+'-sd',parse:function(v){return JSON.parse(v);},          apply:function(d){S.serviceDays=d;}},
    {ref:K+'-tp',parse:function(v){return JSON.parse(v);},          apply:function(d){S.teamPrices=d;}},
    {ref:K+'-sr',parse:function(v){return JSON.parse(v);},          apply:function(d){S.serviceRows=d;}},
  ];
  var loaded=0;
  KEYS.forEach(function(k){
    FDB.ref('ft26/'+k.ref).on('value',function(snap){
      try{if(snap.exists())k.apply(k.parse(snap.val()));}catch(e){console.warn('Parse error',k.ref,e);}
      if(!k._loaded){k._loaded=true;loaded++;if(loaded>=KEYS.length){S.loading=false;render();}}
      else if(!S.loading){render();}
    },function(err){
      console.warn('FB listener error',k.ref,err);
      if(!k._loaded){k._loaded=true;loaded++;if(loaded>=KEYS.length){S.loading=false;render();}}
    });
  });
  // Failsafe: show UI after 5s even if Firebase is slow
  setTimeout(function(){if(S.loading){S.loading=false;render();}},5000);
}

async function xFBPush(){
  const el=document.getElementById('fb-status');
  if(el){el.className='wb';el.textContent='Caricamento in corso...';}
  try{
    await FDB.ref('ft26/'+K+'-c').set(JSON.stringify(S.clubs));
    await FDB.ref('ft26/'+K+'-s').set(JSON.stringify(S.sched));
    await FDB.ref('ft26/'+K+'-k').set(JSON.stringify(S.stk));
    await FDB.ref('ft26/'+K+'-g').set(JSON.stringify(S.groups));
    await FDB.ref('ft26/'+K+'-p').set(JSON.stringify(S.prices));
    await FDB.ref('ft26/'+K+'-m').set(JSON.stringify(S.payments));
    await FDB.ref('ft26/'+K+'-sd').set(JSON.stringify(S.serviceDays));
    await FDB.ref('ft26/'+K+'-tp').set(JSON.stringify(S.teamPrices));
    await FDB.ref('ft26/'+K+'-sd').set(JSON.stringify(S.serviceRows));
    if(el){el.className='gb';el.textContent='Dati caricati su Firebase! Gli altri dispositivi si aggiorneranno automaticamente.';}
  }catch(e){if(el){el.className='rb';el.textContent='Errore: '+e.message;}}
}
async function xFBPull(){
  const el=document.getElementById('fb-status');
  if(el){el.className='wb';el.textContent='Download in corso...';}
  try{
    const rc=await FDB.ref('ft26/'+K+'-c').once('value');
    const rs=await FDB.ref('ft26/'+K+'-s').once('value');
    const rk=await FDB.ref('ft26/'+K+'-k').once('value');
    const rg=await FDB.ref('ft26/'+K+'-g').once('value');
    const rp=await FDB.ref('ft26/'+K+'-p').once('value');
    const rm=await FDB.ref('ft26/'+K+'-m').once('value');
    const rsd=await FDB.ref('ft26/'+K+'-sd').once('value');
    const rtp=await FDB.ref('ft26/'+K+'-tp').once('value');
    const rsr=await FDB.ref('ft26/'+K+'-sr').once('value');
    if(rc.exists())S.clubs=JSON.parse(rc.val()).map(mgC);
    if(rs.exists())S.sched=hydS(JSON.parse(rs.val()));
    if(rk.exists())S.stk=JSON.parse(rk.val());
    if(rg.exists())S.groups=JSON.parse(rg.val());
    if(rp.exists())S.prices=JSON.parse(rp.val());
    if(rm.exists())S.payments=JSON.parse(rm.val());
    if(rsd.exists())S.serviceDays=JSON.parse(rsd.val());
    if(rtp.exists())S.teamPrices=JSON.parse(rtp.val());
    if(rsr.exists())S.serviceRows=JSON.parse(rsr.val());
    render();
    if(el){el.className='gb';el.textContent='Dati scaricati da Firebase!';}
  }catch(e){if(el){el.className='rb';el.textContent='Errore: '+e.message;}}
}

function rCell(cell,adm,date,sid,line){
  const ids=cell?.ids||[];const teams=ids.map(id=>S.clubs.find(c=>c.id===id)).filter(Boolean);
  const eb=adm?`<button class="edit-btn" onclick="xOC('${date}','${sid}',${line})">modifica</button>`:'';

  return`<div class="cw">${eb}<div class="tc-stack" style="border:1px solid ${rg(teams[0].color,.2)}">${teams.map(c=>`<div class="tc-item" style="background:${rg(c.color,.1)};border-left:3px solid ${c.color}"><div class="tcn" style="color:${c.color}">${c.name}${c.auto?' (auto)':''}${c.sharable?' (s)':''}</div>${bstr(c)?`<div class="tcb">${bstr(c)}</div>`:''}</div>`).join('')}</div></div>`;}

function hTbl(day,adm){
  const pres=S.clubs.filter(c=>isAct(c,day.date));
  const pn=pres.length?pres.map(c=>c.name).join(', '):'--';
  const has=SLOTS.some(sl=>LINES.some(l=>(S.sched?.[day.date]?.[sl.id]?.[l]?.ids||[]).length>0));
  return`<div class="card"><div class="chd"><div><div style="font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:800;color:#0F172A;margin-bottom:3px">${day.day} ${day.num} Apr</div><div style="font-size:12px;color:#64748B">-- ${pn}</div></div></div>
  ${!has&&!adm?`<div style="padding:20px;text-align:center;color:#CBD5E1;font-size:13px">Nessuno slot -- Admin > Rotazione > Genera.</div>`:''}
  ${has||adm?`<div style="overflow-x:auto"><table class="st"><thead><tr><th class="tsl">Slot</th><th>L1</th><th>L2</th><th>L3</th><th>L4</th><th class="tnum">1x/${S.stk.s}</th><th class="tnum">2x/${S.stk.d}</th></tr></thead>
  <tbody>${SLOTS.map(sl=>{const tot=slotTot(S.clubs,S.sched,day.date,sl.id);const sc=tot.s>S.stk.s?'ner':tot.s===S.stk.s?'nwn':'nok';const dc=tot.d>S.stk.d?'ner':tot.d===S.stk.d?'nwn':'nok';const warn=tot.s>S.stk.s||tot.d>S.stk.d;
    return`<tr><td class="tsl"><div style="font-size:11px;color:#94A3B8">${sl.ses}</div><div style="font-size:13px;font-weight:700;color:#0F172A;font-family:'Barlow Condensed',sans-serif">${sl.label}</div>${warn?`<div style="font-size:10px;color:#DC2626;font-weight:600">over</div>`:''}</td>
    ${LINES.map(l=>`<td style="padding:3px">${rCell(S.sched?.[day.date]?.[sl.id]?.[l]||{},adm,day.date,sl.id,l)}</td>`).join('')}
    <td class="tnum"><span class="${sc}">${tot.s||'--'}</span></td><td class="tnum"><span class="${dc}">${tot.d||'--'}</span></td></tr>`;}).join('')}
  </tbody></table></div>`:''}
  </div>`;}

function hClub(){

  const selId=S.selClub||S.clubs[0]?.id;const club=S.clubs.find(c=>c.id===selId);
  const my=[];if(club)DAYS.forEach(day=>SLOTS.forEach(sl=>LINES.forEach(l=>{const ids=S.sched?.[day.date]?.[sl.id]?.[l]?.ids||[];if(ids.includes(club.id)){const partners=ids.filter(id=>id!==club.id).map(id=>S.clubs.find(c=>c.id===id)).filter(Boolean);my.push({day,sl,l,partners});}})));
  const cin=club?.in||club?.arrivalDate;const cout=club?.out||club?.departureDate;
  return`<div class="cpw">${S.clubs.map(c=>`<button class="cp" style="background:${c.color};opacity:${c.id===selId?1:.4};transform:${c.id===selId?'scale(1.05)':'scale(1)'}" onclick="set({selClub:'${c.id}'})">${c.name}</button>`).join('')}</div>

  `<div class="es" style="padding:36px">Nessuno slot.</div>`}`:''}`;}

function hRo(){

  const di=DAYS.findIndex(d=>d.date===bD.date);const slotWarn=[];

function hEC(){

// ── ECONOMIA ─────────────────────────────────────────────────────────
// Get days for a specific service for a specific team
// line/s/d default to actual presence days; assist/gym default to 0
function getPrice(cid,key){
  const tp=S.teamPrices&&S.teamPrices[cid];
  if(tp&&tp[key]!==undefined&&tp[key]!==null)return tp[key];
  return S.prices[key]||0;
}
function getSvcDays(c,key){
  const sd=S.serviceDays[c.id];
  if(sd&&sd[key]!==undefined&&sd[key]!==null)return sd[key];
  const actual=DAYS.filter(d=>isAct(c,d.date)).length;
  if(key==='line'||key==='s'||key==='d')return actual;
  return 0; // assist and gym start at 0
}
function daysActual(c){return DAYS.filter(d=>isAct(c,d.date)).length;}
function calcTotal(c){
  const p=S.prices;
  const dLine=getSvcDays(c,'line');
  const dS=getSvcDays(c,'s');
  const dD=getSvcDays(c,'d');
  const dAssist=getSvcDays(c,'assist');
  const dGym=getSvcDays(c,'gym');
  const dGym2=getSvcDays(c,'gym2');
  const lineCost=getPrice(c.id,'line')*dLine;
  const assistCost=getPrice(c.id,'assist')*dAssist;
  const gymCost=getPrice(c.id,'gym')*dGym;
  // boat rows: flexible multi-row
  const boatRows=(S.serviceRows[c.id]||[]);
  const boatCost=boatRows.reduce((a,r)=>a+(r.upr||0)*(r.qty||0)*(r.days||0),0);
  // legacy sCost/dCost from fleet for backward compat (if no boatRows yet)
  const sCost=boatRows.length?0:getPrice(c.id,'s')*(c.fleet?.s||0)*dS;
  const dCost=boatRows.length?0:getPrice(c.id,'d')*(c.fleet?.d||0)*dD;
  const total=lineCost+sCost+dCost+boatCost+assistCost+gymCost;
  return{lineCost,sCost,dCost,boatCost,boatRows,assistCost,gymCost,total,dLine,dS,dD,dAssist,dGym};
}
function fmt(n){return n.toLocaleString('it-IT',{minimumFractionDigits:2,maximumFractionDigits:2});}

async function xAddBoatRow(cid){
  const c=S.clubs.find(x=>x.id===cid);
  const type='s';
  const upr=getPrice(cid,'s');
  const actual=daysActual(c);
  const sr={...S.serviceRows};
  if(!sr[cid])sr[cid]=[];
  sr[cid]=[...sr[cid],{type,qty:1,days:actual,upr}];
  await sSR(sr);
}
async function xDelBoatRow(cid,idx){
  const sr={...S.serviceRows};
  if(!sr[cid])return;
  sr[cid]=sr[cid].filter((_,i)=>i!==idx);
  await sSR(sr);
}
async function xUpdateBoatRow(cid,idx,field,val){
  const sr={...S.serviceRows};
  if(!sr[cid])return;
  const row={...sr[cid][idx]};
  if(field==='qty'||field==='days')row[field]=Math.max(0,parseInt(val)||0);
  else if(field==='upr')row[field]=parseFloat(val)||0;
  else row[field]=val;
  // auto-fill price from global when type changes
  if(field==='type')row.upr=getPrice(cid,val);
  sr[cid]=[...sr[cid]];sr[cid][idx]=row;
  await sSR(sr);
}
async function xMigrateBoats(cid){
  const c=S.clubs.find(x=>x.id===cid);if(!c)return;
  const w=cBW(c);const actual=daysActual(c);
  const sr={...S.serviceRows};sr[cid]=[];
  if(w.s>0)sr[cid].push({type:'s',qty:w.s,days:getSvcDays(c,'s'),upr:getPrice(cid,'s')});
  if(w.d>0)sr[cid].push({type:'d',qty:w.d,days:getSvcDays(c,'d'),upr:getPrice(cid,'d')});
  await sSR(sr);
}
async function xAdjSvcDays(cid,key,delta,defaultDays){
  const sd={...S.serviceDays};
  if(!sd[cid])sd[cid]={};
  const cur=sd[cid][key]!==undefined&&sd[cid][key]!==null?sd[cid][key]:defaultDays;
  sd[cid][key]=Math.max(0,cur+delta);
  await sSD(sd);
}
async function xResetSvcDays(cid,key){
  const sd={...S.serviceDays};
  if(sd[cid]){delete sd[cid][key];if(!Object.keys(sd[cid]).length)delete sd[cid];}
  await sSD(sd);
}
async function xToggleService(id,field,val){
  const upd=S.clubs.map(c=>c.id===id?{...c,[field]:val}:c);
  await sC(upd);
}
async function xSavePrices(){

}
async function xSetPaid(id,val){
  const m={...S.payments};m[id]=parseFloat(val)||0;await sM(m);
}

function prevData(cid){
  const c=S.clubs.find(x=>x.id===cid);if(!c)return null;
  const ct=calcTotal(c);const w=cBW(c);
  const actual=daysActual(c);
  const rows=[];
  const ar=(code,desc,unit,upr,q1,q2,total,notes)=>rows.push({code,desc,unit,upr,q1,q2,total,notes});
  // S1 linea — usa prezzo del team
  ar('S1','Race course usage (daily setup)','team/day',getPrice(cid,'line'),ct.dLine,'--',ct.lineCost,'Non-exclusive; 4 buoy lanes; daily setup; coordination. Minimum guaranteed time: 2 consecutive hours per team per session');
  // Barche — righe flessibili
  const brows=S.serviceRows[cid]||[];
  if(brows.length){
    brows.forEach(function(br,i){
      const lbl=br.type==='s'?'Solo / 1x Boat use':'Double / 2x Boat use';
      const code=br.type==='s'?'S2':'S3';
      const tot=(br.upr||0)*(br.qty||0)*(br.days||0);
      ar(code,lbl,'boat/day',br.upr,br.days,br.qty,tot,'Not exclusive use; included oars');
    });
  } else {
    if(w.s>0)ar('S2','Solo / 1x Boat use','boat/day',getPrice(cid,'s'),ct.dS,w.s,ct.sCost,'Not exclusive use; included oars');
    if(w.d>0)ar('S3','Double / 2x Boat use','boat/day',getPrice(cid,'d'),ct.dD,w.d,ct.dCost,'Not exclusive use; included oars');
  }
  if(ct.dAssist>0)ar('S5','Motorboat assistance (mandatory)','day/shared',getPrice(cid,'assist'),ct.dAssist,'shared',ct.assistCost,'Cost shared among participating teams; includes 1 motorboat + 2 operators');

  return{c,ct,rows,actual,w};
}

function numToWords(n){
  // Simple Italian number to words for amounts
  const ones=['','uno','due','tre','quattro','cinque','sei','sette','otto','nove',
    'dieci','undici','dodici','tredici','quattordici','quindici','sedici','diciassette','diciotto','diciannove'];
  const tens=['','','venti','trenta','quaranta','cinquanta','sessanta','settanta','ottanta','novanta'];
  if(n===0)return'zero';
  if(n<20)return ones[n];
  if(n<100){const t=Math.floor(n/10);const o=n%10;return tens[t]+(o>0?(o===1||o===8?tens[t].slice(0,-1):'')+''+ones[o]:'');}
  if(n<1000){const h=Math.floor(n/100);const r=n%100;return(h===1?'cento':ones[h]+'cento')+(r>0?numToWords(r):'');}
  if(n<10000){const th=Math.floor(n/1000);const r=n%1000;return(th===1?'mille':ones[th]+'mila')+(r>0?numToWords(r):'');}
  return String(n);
}

function amountInWords(tot){
  const euros=Math.floor(tot);
  const cents=Math.round((tot-euros)*100);
  const w=numToWords(euros).toUpperCase();
  return w+'/'+String(cents).padStart(2,'0');
}

      const aD=DAYS.find(x=>x.date===cin);const dD=DAYS.find(x=>x.date===cout);
      doc.setFont('helvetica','bold');doc.setFontSize(10);
      doc.text('Causale:',14,y);
      doc.setFont('helvetica','normal');
      doc.text('Beach Sprint Training Camp, Fano '+( aD?aD.label:cin||'')+' \u2013 '+(dD?dD.label:cout||''),40,y);

      // ── Importo ───────────────────────────────────────────────────
      y+=18;
      doc.setFillColor(10,37,64);doc.rect(14,y-6,W-28,16,'F');
      doc.setTextColor(255,255,255);doc.setFont('helvetica','bold');doc.setFontSize(11);
      doc.text('IMPORTO CORRISPOSTO:',17,y+4);
      doc.setFontSize(14);
      doc.text('\u20ac '+fmt(total),W-16,y+4,{align:'right'});

      y+=22;
      doc.setTextColor(0,0,0);doc.setFont('helvetica','normal');doc.setFontSize(9);
      const words=amountInWords(total);
      doc.text('In lettere: '+words,14,y);

      // ── Note ──────────────────────────────────────────────────────
      y+=14;
      doc.setDrawColor(200,200,200);doc.line(14,y-4,W-14,y-4);
      doc.setFont('helvetica','italic');doc.setFontSize(8);doc.setTextColor(120,120,120);
      doc.text('Documento emesso a titolo di ricevuta per versamento volontario a favore di Club Nautico Fanese "G. Vivani" ASD,',14,y);
      y+=5;
      doc.text('ente non commerciale. Non soggetto a IVA ai sensi art. 4 DPR 633/72.',14,y);

      // ── Firma ─────────────────────────────────────────────────────
      y+=20;
      doc.setTextColor(0,0,0);doc.setFont('helvetica','normal');doc.setFontSize(9);
      doc.text('Fano, '+today,14,y);
      doc.setDrawColor(180,180,180);doc.line(W-80,y+15,W-14,y+15);
      doc.text('Firma e timbro',W-80,y+20);

      // ── Footer ────────────────────────────────────────────────────
      doc.setDrawColor(200,200,200);doc.line(14,H-20,W-14,H-20);
      doc.setFont('helvetica','normal');doc.setFontSize(7);doc.setTextColor(140,140,140);
      doc.text('\u00a9 Rowing Club Adriatico \u2013 rowingclubadriatico.it',14,H-14);
      doc.text('Filippi Cup 2026',W-14,H-14,{align:'right'});

      // Increment receipt number
      S.ricNum=(S.ricNum||1)+1;

      doc.save('ricevuta_'+String(ricN).padStart(3,'0')+'_'+c.name+'_filippi2026.pdf');
    }catch(e){alert('Errore ricevuta: '+e.message);console.error(e);}
    set({pdfBusy:false});
  },50);
}
render();load();
